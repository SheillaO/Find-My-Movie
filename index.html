<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <title>Find Your Movie</title>
</head>

<body>

    <header>
        <div class="header-container">
            <h1>Find Your Movie</h1>
            <nav>
                <!-- New: time-based theme toggle -->
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle theme">🌙</button>
                <a href="WatchList.html" class="nav-link">My Watchlist</a>
            </nav>
        </div>
    </header>
    <main class="main-container">
        <p id="greeting" class="greeting-text"></p> <!-- NEW -->
        <form id="search-form" class="search-form">
            <input type="text" id="search-input" placeholder="Search for a movie title... (e.g. Batman, Inception)"
                required>
            <button type="submit" id="search-btn">Search</button>
        </form>
    
        <div id="movies-container" class="movies-container"></div>
    </main>
    
    <script src="index.js"></script>
    </body>
    
    </html>
