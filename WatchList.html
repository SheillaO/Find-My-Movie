<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <title>My Watch List</title>
</head>

<body>

    <header>
        <div class="header-container">
            <h1>My Watch List</h1>
            <nav>
                <!-- New: time-based theme toggle -->
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle theme">🌙</button>
                <a href="index.html" class="nav-link">Search for Movies</a>
            </nav>
        </div>
    </header>

        <main class="main-container">
            <p id="greeting" class="greeting-text"></p> 
            <div id="watchlist-container" class="movies-container">
                <div class="empty-watchlist">
                    <p>Your watchlist is looking a little empty...</p>
                    <a href="index.html" class="add-movies-btn">+ Let's add some movies</a>
                </div>
            </div>
        </main>
        
        <script src="watchlist.js"></script>
        </body>
        
        </html>
